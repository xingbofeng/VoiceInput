<svg width="1600" height="720" viewBox="0 0 1600 720" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="background" x1="104" y1="38" x2="1476" y2="684" gradientUnits="userSpaceOnUse">
      <stop stop-color="#080B12"/>
      <stop offset="0.52" stop-color="#101522"/>
      <stop offset="1" stop-color="#06080D"/>
    </linearGradient>
    <linearGradient id="accent" x1="518" y1="302" x2="1072" y2="430" gradientUnits="userSpaceOnUse">
      <stop stop-color="#7DD3FC"/>
      <stop offset="0.48" stop-color="#A78BFA"/>
      <stop offset="1" stop-color="#F0ABFC"/>
    </linearGradient>
    <linearGradient id="stroke" x1="486" y1="270" x2="1110" y2="448" gradientUnits="userSpaceOnUse">
      <stop stop-color="white" stop-opacity="0.3"/>
      <stop offset="0.5" stop-color="white" stop-opacity="0.08"/>
      <stop offset="1" stop-color="white" stop-opacity="0.2"/>
    </linearGradient>
    <radialGradient id="glow" cx="0" cy="0" r="1" gradientTransform="translate(800 378) rotate(90) scale(292 612)" gradientUnits="userSpaceOnUse">
      <stop stop-color="#8B5CF6" stop-opacity="0.2"/>
      <stop offset="1" stop-color="#8B5CF6" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur" x="268" y="86" width="1064" height="584" filterUnits="userSpaceOnUse">
      <feGaussianBlur stdDeviation="70"/>
    </filter>
    <filter id="shadow" x="392" y="212" width="816" height="316" filterUnits="userSpaceOnUse">
      <feDropShadow dx="0" dy="30" stdDeviation="34" flood-color="#000000" flood-opacity="0.6"/>
    </filter>
  </defs>

  <rect width="1600" height="720" rx="40" fill="url(#background)"/>
  <g opacity="0.45">
    <path d="M0 112H1600" stroke="white" stroke-opacity="0.04"/>
    <path d="M0 608H1600" stroke="white" stroke-opacity="0.04"/>
    <path d="M192 0V720" stroke="white" stroke-opacity="0.035"/>
    <path d="M1408 0V720" stroke="white" stroke-opacity="0.035"/>
  </g>
  <ellipse cx="800" cy="378" rx="462" ry="222" fill="url(#glow)" filter="url(#blur)"/>

  <text x="800" y="124" text-anchor="middle" fill="white" fill-opacity="0.38"
        font-family="-apple-system, BlinkMacSystemFont, Inter, sans-serif"
        font-size="18" font-weight="600" letter-spacing="7">VOICEINPUT FOR macOS</text>
  <text x="800" y="198" text-anchor="middle" fill="white"
        font-family="-apple-system, BlinkMacSystemFont, Inter, sans-serif"
        font-size="56" font-weight="650" letter-spacing="-2">Hold. Speak. Done.</text>
  <text x="800" y="242" text-anchor="middle" fill="white" fill-opacity="0.52"
        font-family="-apple-system, BlinkMacSystemFont, Inter, sans-serif"
        font-size="21" font-weight="400">让声音自然落进光标所在的位置</text>

  <g filter="url(#shadow)">
    <rect x="438" y="294" width="724" height="152" rx="76" fill="#171C28" fill-opacity="0.94"/>
    <rect x="439" y="295" width="722" height="150" rx="75" stroke="url(#stroke)" stroke-width="2"/>
    <rect x="478" y="326" width="90" height="88" rx="34" fill="white" fill-opacity="0.055"/>

    <rect x="497" y="352" width="7" height="36" rx="3.5" fill="url(#accent)" fill-opacity="0.72"/>
    <rect x="511" y="341" width="7" height="58" rx="3.5" fill="url(#accent)" fill-opacity="0.84"/>
    <rect x="525" y="331" width="7" height="78" rx="3.5" fill="url(#accent)"/>
    <rect x="539" y="344" width="7" height="52" rx="3.5" fill="url(#accent)" fill-opacity="0.82"/>
    <rect x="553" y="350" width="7" height="40" rx="3.5" fill="url(#accent)" fill-opacity="0.74"/>

    <text x="608" y="365" fill="white" fill-opacity="0.48"
          font-family="-apple-system, BlinkMacSystemFont, Inter, sans-serif"
