    <text x="608" y="403" fill="white"
          font-family="-apple-system, BlinkMacSystemFont, Inter, sans-serif"
          font-size="25" font-weight="500">用语音写下下一行代码...</text>

    <rect x="1040" y="339" width="82" height="62" rx="31" fill="white" fill-opacity="0.075"/>
    <text x="1081" y="378" text-anchor="middle" fill="white" fill-opacity="0.82"
          font-family="SFMono-Regular, Menlo, monospace"
          font-size="14" font-weight="600">⌘ R</text>
  </g>

  <g transform="translate(476 526)">
    <circle cx="10" cy="10" r="5" fill="#34D399"/>
    <text x="30" y="17" fill="white" fill-opacity="0.55"
          font-family="-apple-system, BlinkMacSystemFont, Inter, sans-serif"
          font-size="18">Apple Speech streaming</text>
  </g>
  <g transform="translate(748 526)">
    <circle cx="10" cy="10" r="5" fill="#60A5FA"/>
    <text x="30" y="17" fill="white" fill-opacity="0.55"
          font-family="-apple-system, BlinkMacSystemFont, Inter, sans-serif"
          font-size="18">Live RMS waveform</text>
  </g>
  <g transform="translate(990 526)">
    <circle cx="10" cy="10" r="5" fill="#C084FC"/>
    <text x="30" y="17" fill="white" fill-opacity="0.55"
          font-family="-apple-system, BlinkMacSystemFont, Inter, sans-serif"
          font-size="18">Optional LLM refine</text>
  </g>

  <text x="800" y="640" text-anchor="middle" fill="white" fill-opacity="0.28"
        font-family="SFMono-Regular, Menlo, monospace"
        font-size="15" letter-spacing="1">SWIFT  ·  APPKIT  ·  macOS 14+</text>
