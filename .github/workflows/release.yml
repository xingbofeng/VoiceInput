name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Build and publish release
    runs-on: macos-15
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Run tests
        run: swift test

      - name: Build release DMG
        run: make dmg

      - name: Read version
        id: version
        run: |
          VERSION=$(/usr/libexec/PlistBuddy -c "Print :CFBundleShortVersionString" Sources/VoiceInputApp/Resources/Info.plist)
          echo "value=$VERSION" >> $GITHUB_OUTPUT

      - name: Verify release assets
        run: |
          codesign --verify --deep --strict .build/VoiceInputApp.app
          lipo .build/VoiceInputApp.app/Contents/MacOS/VoiceInputApp -verify_arch arm64 x86_64
          shasum -a 256 -c dist/VoiceInput-${{ steps.version.outputs.value }}-macOS.dmg.sha256

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: VoiceInput ${{ steps.version.outputs.value }}
          body_path: .github/release-notes/v${{ steps.version.outputs.value }}.md
          files: |
            dist/VoiceInput-${{ steps.version.outputs.value }}-macOS.dmg
            dist/VoiceInput-${{ steps.version.outputs.value }}-macOS.dmg.sha256
          fail_on_unmatched_files: true
